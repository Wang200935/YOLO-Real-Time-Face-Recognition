name: Build Installers (EXE & DMG)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────── Windows EXE ────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller wheel
          # Install core runtime deps only (skip heavy optional GPU deps)
          pip install opencv-python-headless numpy ultralytics onnxruntime pillow

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "YOLO-FaceRecognition" `
            --hidden-import "cv2" `
            --hidden-import "numpy" `
            --hidden-import "PIL" `
            --hidden-import "tkinter" `
            --collect-all "ultralytics" `
            --collect-all "onnxruntime" `
            main.py

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/YOLO-FaceRecognition.exe
          tag_name: ${{ github.ref_name }}

  # ──────────────────── macOS DMG ────────────────────
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system tools
        run: |
          brew install create-dmg || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller wheel
          # Install core runtime deps
          pip install opencv-python-headless numpy ultralytics onnxruntime pillow

      - name: Build .app with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "YOLO-FaceRecognition" \
            --hidden-import "cv2" \
            --hidden-import "numpy" \
            --hidden-import "PIL" \
            --hidden-import "tkinter" \
            --collect-all "ultralytics" \
            --collect-all "onnxruntime" \
            main.py

      - name: Package into DMG
        run: |
          mkdir -p dist/dmg_staging
          cp -R "dist/YOLO-FaceRecognition.app" dist/dmg_staging/

          # Try create-dmg first, fall back to hdiutil
          if command -v create-dmg &>/dev/null; then
            create-dmg \
              --volname "YOLO Face Recognition" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --app-drop-link 450 185 \
              "dist/YOLO-FaceRecognition.dmg" \
              "dist/dmg_staging/" || \
            hdiutil create \
              -volname "YOLO-FaceRecognition" \
              -srcfolder dist/dmg_staging \
              -ov -format UDZO \
              "dist/YOLO-FaceRecognition.dmg"
          else
            hdiutil create \
              -volname "YOLO-FaceRecognition" \
              -srcfolder dist/dmg_staging \
              -ov -format UDZO \
              "dist/YOLO-FaceRecognition.dmg"
          fi

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/YOLO-FaceRecognition.dmg
          tag_name: ${{ github.ref_name }}
